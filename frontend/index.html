<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cairn</title>
    <!-- Open Graph / Discord / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://the-cairn.com/" />
    <meta property="og:title" content="Cairn" />
    <meta
      property="og:description"
      content="Explore and manage VS waypoints with Cairn. Fast and modern."
    />
    <!-- <meta property="og:image" content="/preview.png" /> -->

    <!-- Twitter -->
    <!-- <meta name="twitter:card" content="summary_large_image" /> -->
    <meta name="twitter:url" content="https://the-cairn.com/" />
    <meta name="twitter:title" content="Cairn" />
    <meta
      name="twitter:description"
      content="Explore and manage VS waypoints with Cairn. Fast and modern."
    />
    <!-- <meta name="twitter:image" content="/preview.png" /> -->
    <script>
      // Pre-paint theme script: applies the saved theme before React renders
      // to avoid a flash of the wrong color scheme. Mirrors lib/theme.ts.
      (function () {
        try {
          var raw = localStorage.getItem("theme_preference");
          var pref = "auto";
          if (raw) {
            var parts = raw.split(":");
            if (
              parts[0] === "1" &&
              (parts[1] === "auto" || parts[1] === "light" || parts[1] === "dark")
            ) {
              pref = parts[1];
            }
          }
          var resolved = pref;
          if (pref === "auto") {
            resolved =
              window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          var root = document.documentElement;
          root.classList.toggle("dark", resolved === "dark");
          root.classList.toggle("light", resolved === "light");
          root.style.colorScheme = resolved;
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
